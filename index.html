<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trademark Images</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f5f5f2;
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      padding: 24px;
      align-items: center;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 48px);
      object-fit: contain;
      background: #fff;
      border: 1px solid #deded8;
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
      }

      img {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="trademark-1.jpg" alt="Trademark image 1">
    <img src="trademark-2.png" alt="Trademark image 2">
  </main>
</body>
</html>
